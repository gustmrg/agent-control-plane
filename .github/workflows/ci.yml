name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: docker compose -f deploy/compose.yml config
        env:
          AGENT_CONTROL_API_TOKEN: ci-only-token
      - run: docker build -f apps/gateway/Dockerfile -t agent-control-gateway:ci .
      - run: docker build -f images/sandbox/Dockerfile -t agent-control-sandbox:ci .
